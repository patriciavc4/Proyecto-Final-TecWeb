<!DOCTYPE html>
<html lang="es" xmlns = "https://www.thymeleaf.org">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Aspirantes</title>
    <meta
            content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
            name="viewport"
    />
    <link
            rel="icon"
            href="../assets/img/kaiadmin/favicon.ico"
            type="image/x-icon"
    />

    <script src="../assets/js/plugin/webfont/webfont.min.js"></script>
    <script>
        WebFont.load({
          google: { families: ["Public Sans:300,400,500,600,700"] },
          custom: {
            families: [
              "Font Awesome 5 Solid",
              "Font Awesome 5 Regular",
              "Font Awesome 5 Brands",
              "simple-line-icons",
            ],
            urls: ["../assets/css/fonts.min.css"],
          },
          active: function () {
            sessionStorage.fonts = true;
          },
        });
    </script>

    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/plugins.min.css" />
    <link rel="stylesheet" href="../assets/css/kaiadmin.min.css" />

    <link rel="stylesheet" href="../assets/css/demo.css" />

    <style>
        .main-panel > .container {
            padding-top: 45px !important;
            margin-top: 0 !important;
        }
        .page-inner {
            padding-top: 0 !important;
            margin-top: 0 !important;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="sidebar" data-background-color="dark">
        <div class="sidebar-logo">
            <div class="logo-header" style="margin-top: 30px;">
                <a href="inicio" class="logo">
                    <img
                            src="../assets/img/logo_adm3.png"
                            alt="Logo"
                            class="navbar-brand"
                            height="100"
                    />
                </a>
            </div>
        </div>
        <div class="sidebar-wrapper scrollbar scrollbar-inner">
            <div class="sidebar-content">
                <ul class="nav nav-secondary">

                    <li class="nav-item">
                        <a href="inicio">
                            <i class="fas fa-home"></i>
                            <p>Inicio</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a th:href="@{/Aspirantes}">
                            <i class="fas fa-list"></i>
                            <p>Aspirantes</p>
                        </a>
                    </li>

                    <li class="nav-item active">
                        <a th:href="@{/Carreras}">
                            <i class="fas fa-graduation-cap"></i>
                            <p>Carreras</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="logout">
                            <i class="fas fa-sign-out-alt"></i>
                            <p>Salir</p>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    <div class="main-panel ">
        <div class="container">
            <div class="page-inner">
                <div class="page-header d-flex justify-content-between align-items-center mb-3">
                    <div class="d-flex align-items-center">
                        <span class="page-icon me-3 text-secondary fs-2"><i class="fas fa-graduation-cap" aria-hidden="true"></i></span>
                        <h2 class="fw-bold text-secondary mb-0">Mantenimiento de Carreras</h2>
                    </div>

                    <div class="input-group" style="width: 300px;">
                        <span class="input-group-text bg-white border-end-0"><i class="fa fa-search text-muted"></i></span>
                        <input type="text" id="buscador-custom" class="form-control border-start-0" placeholder="Buscar carrera...">
                    </div>

                </div>

                <div class="row">
                    <div class="col-md-12">


                        <div class="card">
                            <div class="card-header">
                                <div class="d-flex align-items-center">
                                    <h4 class="card-title text-muted">Listado de aspirantes</h4>
                                    <button
                                            class="btn btn-secondary btn-round ms-auto"
                                            data-bs-toggle="modal"
                                            data-bs-target="#modal-correo-masivo"
                                    >
                                        <i class="fa fa-plus"></i>
                                        Correo masivo
                                    </button>
                                </div>
                            </div>
                            <div class="card-body">

                                <div class="table-responsive">
                                    <table
                                            id="Aspirantes"
                                            class="display table table-striped table-hover"
                                    >
                                        <thead>
                                        <tr>
                                            <th>Nombre</th>
                                            <th>Correo electrónico</th>
                                            <th>Acciones</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                            <th>Luis Eduardo Avila</th>
                                            <th>Lalito@gmail.com</th>
                                            <th><button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modal-correo-individual"><i class ="icon-envelope-letter"></i></button>
                                                 <button type="button" class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#modal-informacion-alumno"><i class="icon-user"></i></button>
                                                 <button type="button" class="btn btn-default" data-bs-toggle="modal" data-bs-target="#modal-imprimir"><i class="icon-printer"></i></button>
                                                </th>
                                        </tbody>
                                        <tfoot>
                                        <tr>
                                            <th>Nombre</th>
                                            <th>Correo electrónico</th>
                                            <th>Acciones</th>
                                        </tr>
                                        </tfoot>
                                        <tbody>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Modal correo masivo -->
    <div
            class="modal fade"
            id="modal-correo-masivo"
            tabindex="-1"
    >
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title">
                        <span class="fw-mediumbold">Correo masivo</span>
                    </h5>
                    <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Close"
                    >
                    </button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="row">
                            <div class="col-sm-12">
                                <div class="form-group form-group-default">
                                    <label>Asunto</label>
                                    <input
                                            id="asunto-masivo"
                                            type="text"
                                            class="form-control"
                                            placeholder="Ingrese el nombre de la carrera"
                                    />
                                </div>
                            </div>
                            <div class="col-sm-12">
                                <div class="form-group form-group-default">
                                    <label>Mensaje</label>
                                    <input
                                            id="mensaje-masivo"
                                            type="text"
                                            class="form-control"
                                            placeholder="Ingrese el número de semestres"
                                            rows = "4"
                                    />
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-secondary" onclick="correoMasivo();">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal correo individual -->
    <div
            class="modal fade"
            id="modal-correo-individual"
            tabindex="-1"
    >
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title">
                        <span class="fw-mediumbold">Enviar correo a </span>
                    </h5>
                    <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Close"
                    >
                    </button>
                </div>
                <div class="modal-body">
                    <form>
                        <input id="carrera-update" type="hidden" />
                        <div class="row">
                            <div class="col-sm-12">
                                <div class="form-group form-group-default">
                                    <label>Asunto</label>
                                    <input
                                            id="asunto-individual"
                                            type="text"
                                            class="form-control"
                                            placeholder="Ingrese el asunto del correo"
                                            rows = "1"
                                    />
                                </div>
                            </div>
                            <div class="col-sm-12">
                                <div class="form-group form-group-default">
                                    <label>Mensaje</label>
                                    <input
                                            id="mensaje-individual"
                                            type="text"
                                            class="form-control"
                                            placeholder="Ingrese el mensaje del correo"
                                            rows = "4"
                                    />
                                </div>
                            </div>
                            <div class="col-sm-12">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="correoIndividual();">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal informacion alumno -->
    <div
            class="modal fade"
            id="modal-informacion-alumno"
            tabindex="-1"
    >
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title">
                        <span class="fw-mediumbold">Informacion del alumno </span>
                    </h5>
                    <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Close"
                    >
                    </button>
                </div>
                <div class="modal-body">
                    <form>
                        <input id="carrera-update" type="hidden" />
                        <div class="row">
                            <div class="col-sm-12">
                                <div class="form-group form-group-default">
                                    <label>Nombre</label>
                                    <input
                                            id="asunto-individual"
                                            type="text"
                                            class="form-control"
                                            placeholder="Ingrese el asunto del correo"
                                            rows = "1"
                                    />
                                </div>
                            </div>
                            <div class="col-sm-12">
                                <div class="form-group form-group-default">
                                    <label>Telefono</label>
                                    <input
                                            id="mensaje-individual"
                                            type="text"
                                            class="form-control"
                                            placeholder="Ingrese el mensaje del correo"
                                            rows = "4"
                                    />
                                </div>
                            </div>
                            <div class="col-sm-12">
                                <div class="form-group form-group-default">
                                    <label>Email</label>
                                    <input
                                            id="mensaje-individual"
                                            type="text"
                                            class="form-control"
                                            placeholder="Ingrese el mensaje del correo"
                                            rows = "4"
                                    />
                                </div>
                            </div>
                            <div class="col-sm-12">
                                <div class="form-group form-group-default">
                                    <label>Carrera</label>
                                    <input
                                            id="carrera"
                                            type="text"
                                            class="form-control"
                                            placeholder=""
                                            rows = "1"
                                    />
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="../assets/js/core/jquery-3.7.1.min.js"></script>
<script src="../assets/js/core/popper.min.js"></script>
<script src="../assets/js/core/bootstrap.min.js"></script>
<script src = "/assets/js/jspropios/crud-aspirantes.js"></script>

<script src="../assets/js/plugin/jquery-scrollbar/jquery.scrollbar.min.js"></script>
<script src="../assets/js/plugin/datatables/datatables.min.js"></script>
<script src="../assets/js/kaiadmin.min.js"></script>
<script src="../assets/js/setting-demo2.js"></script>

<script src="../assets/js/jspropios/crud-carreras.js"></script>

<script>
    $(document).ready(function () {
        var miTabla = $("#add-row").DataTable({
            order: [],
            dom: 't<"row mt-3"<"col-sm-12 col-md-4 d-flex align-items-center"l><"col-sm-12 col-md-4 text-center"i><"col-sm-12 col-md-4"p>>',
            language: {
                emptyTable: "No hay datos disponibles",
                zeroRecords: "No se encontraron resultados",
                lengthMenu: "Mostrar _MENU_ registros",
                info: "Mostrando _START_ a _END_ de _TOTAL_ registros",
                infoEmpty: "Mostrando 0 registros",
                infoFiltered: "(filtrado de _MAX_ registros totales)",
                paginate: {
                    first: "«",
                    last: "»",
                    next: "›",
                    previous: "‹"
                }
            }
        });

        // Conectar el nuevo buscador con la tabla
        $('#buscador-custom').on('keyup', function () {
            miTabla.search(this.value).draw();
        });

        listar();
    });
</script>

</body>
</html>
