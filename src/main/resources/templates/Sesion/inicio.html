<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UPIIZ Admisión</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            margin: 0;
            background-color: #f4f6f9;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .wrapper {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background-color: #1e1e2d;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar-logo {
            text-align: center;
            margin-bottom: 30px;
            color: #e4e6ef;
        }
        .sidebar-logo i {
            color: #5b62a4;
        }
        .sidebar-logo h4 {
            margin-top: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 0;
        }
        .sidebar-logo small {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #a1a5b7;
        }
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 8px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.05);
            padding: 40px;
        }
        .login-title {
            color: #5b62a4;
            font-weight: 600;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-custom {
            background-color: #5b62a4;
            border: none;
            padding: 10px;
            font-weight: 500;
        }
        .btn-custom:hover {
            background-color: #494e85;
        }
        .form-control:focus {
            border-color: #5b62a4;
            box-shadow: 0 0 0 0.25rem rgba(91, 98, 164, 0.25);
        }
        .form-label {
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="sidebar">
        <div class="sidebar-logo">
            <i class="bi bi-mortarboard fs-1"></i>
            <h4>UPIIZ</h4>
            <small>ADMISIÓN 2026</small>
        </div>
    </div>

    <div class="main-content">
        <div class="login-card">
            <h4 class="login-title">
                <i class="bi bi-person-fill-lock"></i> Iniciar Sesión
            </h4>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label text-muted fw-bold">CORREO ELECTRÓNICO</label>
                    <input type="email" class="form-control" id="email" placeholder="" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-muted fw-bold">CONTRASEÑA</label>
                    <input type="password" class="form-control" id="password" placeholder="" required>
                </div>

                <div id="mensajeError" class="alert alert-danger d-none text-center" role="alert" style="font-size: 0.9rem;"></div>

                <button type="submit" class="btn btn-primary w-100 btn-custom" id="btnLogin">
                    Entrar al Panel
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<script>
    $(document).ready(function() {
        $("#loginForm").on("submit", function(e) {
            e.preventDefault();

            $("#mensajeError").addClass("d-none");

            $.ajax({
                url: "/login",
                type: "POST",
                data: {
                    email: $("#email").val(),
                    password: $("#password").val()
                },
                success: function(response) {
                    if (response.success) {
                        window.location.href = response.redirect;
                    }
                },
                error: function(xhr) {
                    let errorMsg = xhr.responseJSON ? xhr.responseJSON.message : "Error al conectar";
                    $("#mensajeError").text(errorMsg).removeClass("d-none");
                }
            });
        });
    });
</script>
</body>
</html>
